      <h2>Experience</h2>
      <p>A timeline of professional roles focused on knowledge systems, documentation, and operational design.</p>
      
      <svg width="100%" viewBox="0 0 680 1480" style="margin-top: 2rem;" role="img">
        <title>Fletcher's professional experience timeline</title>
        <desc>A vertical timeline of professional roles from newest (top) to oldest (bottom), showing companies, dates, and key accomplishments in documentation and operations work.</desc>
        <defs>
          <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </marker>
        </defs>

        <!-- Timeline connector line (vertical spine) -->
        <line x1="100" y1="60" x2="100" y2="1420" stroke="var(--secondary)" stroke-width="0.5" opacity="0.4"/>

        <!-- Timeline dot -->
        <circle cx="100" cy="140" r="4" fill="var(--secondary)"/>

        <!-- Card 1: Director of Operations (newest) -->
        <g class="node" onclick="sendPrompt('Tell me more about the DLE Event Group role')">
          <rect x="140" y="80" width="500" height="120" rx="8" fill="var(--bg-secondary)" stroke="0.5px solid var(--border-light)" stroke-width="0.5"/>
          <text x="160" y="108" font-family="var(--font-sans)" font-size="16" font-weight="600" fill="var(--primary)" dominant-baseline="central">Director of Operations &amp; Project Execution</text>
          <text x="160" y="130" font-family="var(--font-sans)" font-size="13" fill="var(--text-tertiary)" dominant-baseline="central">DLE Event Group • Sept–Nov 2025</text>
          <text x="160" y="155" font-family="var(--font-sans)" font-size="15" fill="var(--text-secondary)" dominant-baseline="central">Built repeatable systems and an AI knowledge base that removed the founder from constant firefighting within 2 months.</text>
          <text x="160" y="177" font-family="var(--font-sans)" font-size="15" fill="var(--text-secondary)" dominant-baseline="central">Restructured the CRM into a functional hub with clear workflows, reducing manual overhead.</text>
        </g>

        <!-- Timeline dot -->
        <circle cx="100" cy="260" r="4" fill="var(--secondary)"/>

        <!-- Card 2: Technical Writer -->
        <g class="node" onclick="sendPrompt('Tell me more about the Qount role')">
          <rect x="140" y="200" width="500" height="120" rx="8" fill="var(--bg-secondary)" stroke="0.5px solid var(--border-light)" stroke-width="0.5"/>
          <text x="160" y="228" font-family="var(--font-sans)" font-size="16" font-weight="600" fill="var(--primary)" dominant-baseline="central">Technical Writer (Operational Documentation)</text>
          <text x="160" y="250" font-family="var(--font-sans)" font-size="13" fill="var(--text-tertiary)" dominant-baseline="central">Qount • June–Sept 2025</text>
          <text x="160" y="275" font-family="var(--font-sans)" font-size="15" fill="var(--text-secondary)" dominant-baseline="central">Migrated 100+ support and product articles from fragmented tools into one source of truth, cutting clarification meetings by 30%.</text>
          <text x="160" y="297" font-family="var(--font-sans)" font-size="15" fill="var(--text-secondary)" dominant-baseline="central">Established documentation standards that eliminated ambiguity and reduced follow-up friction between writers and subject matter experts.</text>
        </g>

        <!-- Timeline dot -->
        <circle cx="100" cy="430" r="4" fill="var(--secondary)"/>

        <!-- Card 3: Documentation Team Lead -->
        <g class="node" onclick="sendPrompt('Tell me more about the Superna role')">
          <rect x="140" y="360" width="500" height="140" rx="8" fill="var(--bg-secondary)" stroke="0.5px solid var(--border-light)" stroke-width="0.5"/>
          <text x="160" y="388" font-family="var(--font-sans)" font-size="16" font-weight="600" fill="var(--primary)" dominant-baseline="central">Documentation Team Lead &amp; Project Coordinator</text>
          <text x="160" y="410" font-family="var(--font-sans)" font-size="13" fill="var(--text-tertiary)" dominant-baseline="central">Superna • Nov 2023–Feb 2025</text>
          <text x="160" y="435" font-family="var(--font-sans)" font-size="15" fill="var(--text-secondary)" dominant-baseline="central">Rebuilt 150+ technical articles by translating complex cybersecurity content into accessible language and validating outdated information.</text>
          <text x="160" y="457" font-family="var(--font-sans)" font-size="15" fill="var(--text-secondary)" dominant-baseline="central">Captured institutional knowledge from retiring team members and established handoff templates connecting dev, product, and CS to reduce resolution time.</text>
        </g>

        <!-- Timeline dot -->
        <circle cx="100" cy="660" r="4" fill="var(--secondary)"/>

        <!-- Card 4: Documentation Engineer -->
        <g class="node" onclick="sendPrompt('Tell me more about the Traze role')">
          <rect x="140" y="580" width="500" height="160" rx="8" fill="var(--bg-secondary)" stroke="0.5px solid var(--border-light)" stroke-width="0.5"/>
          <text x="160" y="608" font-family="var(--font-sans)" font-size="16" font-weight="600" fill="var(--primary)" dominant-baseline="central">Documentation Engineer</text>
          <text x="160" y="630" font-family="var(--font-sans)" font-size="13" fill="var(--text-tertiary)" dominant-baseline="central">Traze • Nov 2020–Nov 2023</text>
          <text x="160" y="655" font-family="var(--font-sans)" font-size="15" fill="var(--text-secondary)" dominant-baseline="central">Built 250+ articles from zero documentation in an organization with only CEO knowledge, systematically capturing expertise from isolated SMEs to prevent silos.</text>
          <text x="160" y="677" font-family="var(--font-sans)" font-size="15" fill="var(--text-secondary)" dominant-baseline="central">Delivered documentation so clear the company closed a client deal without revision, eliminating typical sales cycle friction.</text>
        </g>

        <!-- Timeline dot -->
        <circle cx="100" cy="880" r="4" fill="var(--secondary)"/>

        <!-- Card 5: Project Manager -->
        <g class="node" onclick="sendPrompt('Tell me more about the TWL role')">
          <rect x="140" y="800" width="500" height="160" rx="8" fill="var(--bg-secondary)" stroke="0.5px solid var(--border-light)" stroke-width="0.5"/>
          <text x="160" y="828" font-family="var(--font-sans)" font-size="16" font-weight="600" fill="var(--primary)" dominant-baseline="central">Project Manager – Internal Control Manager</text>
          <text x="160" y="850" font-family="var(--font-sans)" font-size="13" fill="var(--text-tertiary)" dominant-baseline="central">TWL S.A.S. • Dec 2018–Nov 2020</text>
          <text x="160" y="875" font-family="var(--font-sans)" font-size="15" fill="var(--text-secondary)" dominant-baseline="central">Managed end-to-end execution across 50+ staff and 13 simultaneous initiatives by establishing clear communication hierarchies that kept teams aligned.</text>
          <text x="160" y="897" font-family="var(--font-sans)" font-size="15" fill="var(--text-secondary)" dominant-baseline="central">Audited company operations and designed workflows that eliminated gaps in execution order.</text>
        </g>
